  DOWN:  { zmk: "&kp DOWN",  qmk: "KC_DOWN" }
  LEFT:  { zmk: "&kp LEFT",  qmk: "KC_LEFT" }
  RIGHT: { zmk: "&kp RIGHT", qmk: "KC_RIGHT" }
  HOME:  { zmk: "&kp HOME",  qmk: "KC_HOME" }
  END:   { zmk: "&kp END",   qmk: "KC_END" }
  PGUP:  { zmk: "&kp PG_UP", qmk: "KC_PGUP" }
  PGDN:  { zmk: "&kp PG_DN", qmk: "KC_PGDN" }
  INS:   { zmk: "&kp INS",   qmk: "KC_INS" }

# ── letters ─────────────────────────────────────────────────────────────
