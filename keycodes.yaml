# Firmware-agnostic key name -> keycode mappings.
# Used by the generator to resolve key names into firmware-specific keycodes.
#
# Each key has a canonical name and one or more firmware mappings.
# The generator picks the right mapping based on the target firmware.

firmwares: [zmk, qmk]

# ── basic ───────────────────────────────────────────────────────────────
basic:
  NONE:   { zmk: "&none",           qmk: "KC_NO" }
  TRANS:  { zmk: "&none",           qmk: "_______" }
  ESC:    { zmk: "&kp ESC",         qmk: "KC_ESC" }
  TAB:    { zmk: "&kp TAB",         qmk: "KC_TAB" }
  RET:    { zmk: "&kp RET",         qmk: "KC_ENT" }
  ENT:    { zmk: "&kp RET",         qmk: "KC_ENT" }
  SPC:    { zmk: "&kp SPACE",       qmk: "KC_SPC" }
  BSPC:   { zmk: "&kp BSPC",        qmk: "KC_BSPC" }
  DEL:    { zmk: "&kp DEL",         qmk: "KC_DEL" }
  CAPS:   { zmk: "&kp CAPS",        qmk: "KC_CAPS" }

# ── modifiers ───────────────────────────────────────────────────────────
modifiers:
  LCTL: { zmk: "&kp LCTRL", qmk: "KC_LCTL" }
  LALT: { zmk: "&kp LALT",  qmk: "KC_LALT" }
  LSFT: { zmk: "&kp LSHFT", qmk: "KC_LSFT" }
  LGUI: { zmk: "&kp LGUI",  qmk: "KC_LGUI" }
  RCTL: { zmk: "&kp RCTRL", qmk: "KC_RCTL" }
  RALT: { zmk: "&kp RALT",  qmk: "KC_RALT" }
  RSFT: { zmk: "&kp RSHFT", qmk: "KC_RSFT" }
  RGUI: { zmk: "&kp RGUI",  qmk: "KC_RGUI" }

# ── F-keys ──────────────────────────────────────────────────────────────
f_keys:
  F1:  { zmk: "&kp F1",  qmk: "KC_F1" }
  F2:  { zmk: "&kp F2",  qmk: "KC_F2" }
  F3:  { zmk: "&kp F3",  qmk: "KC_F3" }
  F4:  { zmk: "&kp F4",  qmk: "KC_F4" }
  F5:  { zmk: "&kp F5",  qmk: "KC_F5" }
  F6:  { zmk: "&kp F6",  qmk: "KC_F6" }
  F7:  { zmk: "&kp F7",  qmk: "KC_F7" }
  F8:  { zmk: "&kp F8",  qmk: "KC_F8" }
  F9:  { zmk: "&kp F9",  qmk: "KC_F9" }
  F10: { zmk: "&kp F10", qmk: "KC_F10" }
  F11: { zmk: "&kp F11", qmk: "KC_F11" }
  F12: { zmk: "&kp F12", qmk: "KC_F12" }

# ── navigation ──────────────────────────────────────────────────────────
