  AT:    { zmk: "&kp AT",     qmk: "KC_AT" }     # @
  HASH:  { zmk: "&kp HASH",   qmk: "KC_HASH" }   # #
  DLLR:  { zmk: "&kp DLLR",   qmk: "KC_DLR" }    # $
  PRCNT: { zmk: "&kp PRCNT",  qmk: "KC_PERC" }   # %
  CARET: { zmk: "&kp CARET",  qmk: "KC_CIRC" }   # ^
  AMPS:  { zmk: "&kp AMPS",   qmk: "KC_AMPR" }   # &
  ASTRK: { zmk: "&kp ASTRK",  qmk: "KC_ASTR" }   # *
  LPAR:  { zmk: "&kp LPAR",   qmk: "KC_LPRN" }   # (
  RPAR:  { zmk: "&kp RPAR",   qmk: "KC_RPRN" }   # )
  LBRC:  { zmk: "&kp LBRC",   qmk: "KC_LCBR" }   # {
  RBRC:  { zmk: "&kp RBRC",   qmk: "KC_RCBR" }   # }
  COLON: { zmk: "&kp COLON",  qmk: "KC_COLN" }   # :
  UNDER: { zmk: "&kp UNDER",  qmk: "KC_UNDS" }   # _
  PIPE:  { zmk: "&kp PIPE",   qmk: "KC_PIPE" }   # |
  TILDE: { zmk: "&kp TILDE",  qmk: "KC_TILD" }   # ~
  PLUS:  { zmk: "&kp PLUS",   qmk: "KC_PLUS" }   # +

# ── media ───────────────────────────────────────────────────────────────
media:
  VOLU: { zmk: "&kp C_VOL_UP",  qmk: "KC_VOLU" }
  VOLD: { zmk: "&kp C_VOL_DN",  qmk: "KC_VOLD" }
  MUTE: { zmk: "&kp C_MUTE",    qmk: "KC_MUTE" }
  MPLY: { zmk: "&kp C_PP",      qmk: "KC_MPLY" }
  MPRV: { zmk: "&kp C_PREV",    qmk: "KC_MPRV" }
  MNXT: { zmk: "&kp C_NEXT",    qmk: "KC_MNXT" }
  MSTP: { zmk: "&kp C_STOP",    qmk: "KC_MSTP" }

# ── system ──────────────────────────────────────────────────────────────
system:
  PSCRN: { zmk: "&kp PSCRN",       qmk: "KC_PSCR" }
  SLCK:  { zmk: "&kp SLCK",        qmk: "KC_SLCK" }
  PAUSE: { zmk: "&kp PAUSE_BREAK", qmk: "KC_PAUS" }
  K_APP: { zmk: "&kp K_APP",       qmk: "KC_APP" }
  BOOT:  { zmk: "&bootloader",     qmk: "QK_BOOT" }

# ── behavior aliases (resolved by generator, not simple keycodes) ───────
# These are NOT simple keycodes - they expand into behavior macros.
# The generator handles them specially.
behaviors:
  # MT(mod, key): mod-tap - hold = modifier, tap = key
  #   args: modifier_name, key_name
  #   zmk: U_MT(MOD, KEY)
  #   qmk: MT(MOD, KEY)
  MT:
    zmk_template: "U_MT({mod}, {key})"
    qmk_template: "MT({mod}, {key})"
    zmk_mod_map:
      LCTL: LCTRL
      RCTL: RCTRL
      LSFT: LSHFT
      RSFT: RSHFT

  # LT(layer, key): layer-tap - hold = momentary layer, tap = key
  #   zmk: U_LT(U_LAYER, KEY)
  #   qmk: LT(LAYER, KEY)
  LT:
    zmk_template: "U_LT(U_{layer}, {key})"
    qmk_template: "LT({layer}, {key})"

  # MO(layer): momentary layer activation
  MO:
    zmk_template: "&mo U_{layer}"
    qmk_template: "MO({layer})"

  # TO(layer): toggle layer
  TO:
    zmk_template: "&to U_{layer}"
    qmk_template: "TO({layer})"

  # TOG(layer): toggle layer on/off
  TOG:
    zmk_template: "&tog U_{layer}"
    qmk_template: "TG({layer})"
